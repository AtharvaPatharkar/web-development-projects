<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Syntax Highlighter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📝 Markdown Syntax Highlighter</h1>
            <p>Enter your markdown text below and see the live preview with syntax highlighting!</p>
        </header>

        <main>
            <section class="markdown-editor">
                <h2>Markdown Editor</h2>
                <textarea id="markdown-input" placeholder="Enter your markdown text here..."></textarea>
            </section>

            <section class="preview-section">
                <h2>Live Preview</h2>
                <div id="preview" class="preview"></div>
            </section>
        </main>
    </div>

    <hr>

    <footer>
        <div class="copyright">
            © 2026 AtharvaPatharkar. All rights reserved.
        </div>
        <a class="github-link" href="https://github.com/AtharvaPatharkar" target="_blank">GitHub</a>
    </footer>

    <script src="script.js"></script>
</body>
</html>
